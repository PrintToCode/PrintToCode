name: Generate Snake and Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: PrintToCode
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: snake-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-pacman:
    runs-on: ubuntu-latest
    steps:
      - uses: huantt/pacman-contribution-graph@v1.0.0
        with:
          github-username: PrintToCode
          ghToken: ${{ secrets.GITHUB_TOKEN }}
          outputFolder: dist
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
